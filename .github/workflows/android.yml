name: Android CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/focus-app.keystore

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Extract Release Notes
      id: extract_notes
      run: |
        NOTES=$(python3 .github/workflows/extract_release_notes.py)
        echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
        echo "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/*.apk
        tag_name: ${{ github.ref_name }}
        name: Focus Flow ${{ github.ref_name }}
        body: |
          Focus Flow ${{ github.ref_name }} 버전이 출시되었습니다! 🚀
          
          ### 📝 이번 버전의 주요 변경 사항
          ${{ steps.extract_notes.outputs.RELEASE_NOTES }}
          
          ---
          **설치 방법:**
          아래 Assets에서 APK 파일을 다운로드하여 설치해 주세요. 기존 앱이 설치되어 있다면 덮어쓰기로 업데이트됩니다.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
